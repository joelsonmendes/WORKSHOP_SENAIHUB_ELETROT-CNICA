<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dia 5 - Correção de Fator de Potência</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<header class="topo">
  <img src="../assets/logo-senai-hub.webp" alt="SENAI Hub" class="logo" onerror="this.style.display='none'">
  <h1>Dia 5 — Correção de Fator de Potência</h1>
  <p>FP Control — Banco de Capacitores</p>
</header>

<main class="container">
  <section class="card">
    <h2>Objetivo da prática</h2>
    <p>Calcular a potência reativa capacitiva necessária para correção do fator de potência.</p>
  </section>

  <section class="card">
    <h2>Dados da instalação</h2>
    <div class="form-grid">
      <div class="campo">
        <label>Nome da equipe</label>
        <input id="equipe" type="text">
      </div>
      <div class="campo">
        <label>Potência ativa P em W</label>
        <input id="p" type="number" step="0.01">
      </div>
      <div class="campo">
        <label>FP atual</label>
        <input id="fpAtual" type="number" step="0.01" value="0.75">
      </div>
      <div class="campo">
        <label>FP desejado</label>
        <input id="fpDesejado" type="number" step="0.01" value="0.95">
      </div>
      <div class="campo">
        <label>Tensão em V</label>
        <input id="tensao" type="number" step="0.01" value="220">
      </div>
      <div class="campo">
        <label>Frequência em Hz</label>
        <input id="f" type="number" step="0.01" value="60">
      </div>
    </div>

    <div class="campo">
      <label>Observação</label>
      <textarea id="observacao"></textarea>
    </div>

    <div class="botoes">
      <button onclick="calcularDia05()">Calcular</button>
      <button onclick="salvarDia05()">Salvar</button>
      <button onclick="window.print()">Imprimir/PDF</button>
      <a href="../index.html" class="botao">Voltar</a>
    </div>
  </section>

  <section class="card">
    <h2>Resultado</h2>
    <div id="resultado" class="resultado">Preencha os campos e clique em calcular.</div>
  </section>
</main>

<script src="../js/utils.js"></script>
<script src="../js/dia05.js"></script>
</body>
</html>
