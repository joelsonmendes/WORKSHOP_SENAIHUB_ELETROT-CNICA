<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dia 3 - Impedância</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<header class="topo">
  <img src="../assets/logo-senai-hub.webp" alt="SENAI Hub" class="logo" onerror="this.style.display='none'">
  <h1>Dia 3 — Impedância</h1>
  <p>ZCalc — Circuitos RL, RC e RLC</p>
</header>

<main class="container">
  <section class="card">
    <h2>Objetivo da prática</h2>
    <p>Calcular reatância indutiva, reatância capacitiva e impedância equivalente em circuitos de corrente alternada.</p>
  </section>

  <section class="card">
    <h2>Dados do circuito</h2>
    <div class="form-grid">
      <div class="campo">
        <label>Nome da equipe</label>
        <input id="equipe" type="text">
      </div>
      <div class="campo">
        <label>Tipo de circuito</label>
        <select id="tipo">
          <option>RL</option>
          <option>RC</option>
          <option>RLC</option>
        </select>
      </div>
      <div class="campo">
        <label>Resistência R em Ω</label>
        <input id="r" type="number" step="0.01">
      </div>
      <div class="campo">
        <label>Indutância L em H</label>
        <input id="l" type="number" step="0.0001">
      </div>
      <div class="campo">
        <label>Capacitância C em µF</label>
        <input id="c" type="number" step="0.01">
      </div>
      <div class="campo">
        <label>Frequência em Hz</label>
        <input id="f" type="number" step="0.01" value="60">
      </div>
    </div>

    <div class="campo">
      <label>Observação</label>
      <textarea id="observacao"></textarea>
    </div>

    <div class="botoes">
      <button onclick="calcularDia03()">Calcular</button>
      <button onclick="salvarDia03()">Salvar</button>
      <button onclick="window.print()">Imprimir/PDF</button>
      <a href="../index.html" class="botao">Voltar</a>
    </div>
  </section>

  <section class="card">
    <h2>Resultado</h2>
    <div id="resultado" class="resultado">Preencha os campos e clique em calcular.</div>
  </section>
</main>

<script src="../js/utils.js"></script>
<script src="../js/dia03.js"></script>
</body>
</html>
